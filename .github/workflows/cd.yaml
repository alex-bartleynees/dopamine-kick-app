name: Build and Deploy with Helm
on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate build ID
        id: tag
        run: echo "build_id=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            creativefree/dopamine-kick-app:latest
            creativefree/dopamine-kick-app:${{ steps.tag.outputs.build_id }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: "latest"

      - name: Set Git user info
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_NAME }}"

      - name: Update values.yaml with build tag
        run: |
          sed -i "s/tag: .*/tag: \"${{ steps.tag.outputs.build_id }}\"/" deployment/helm-charts/dopamine-kick-app/values.yaml
          git add deployment/helm-charts/dopamine-kick-app/values.yaml
          git commit -m "Update image tag to ${{ steps.tag.outputs.build_id }}"
          git push origin main

      - name: Package and Push Helm Chart
        run: |
          helm package ./deployment/helm-charts/dopamine-kick-app
          helm push dopamine-kick-app-*.tgz oci://registry-1.docker.io/creativefree
